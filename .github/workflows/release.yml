name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS build ─────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd electron && npm install

      - name: Copy app files into electron/
        run: cd electron && npm run copy-files

      - name: Build macOS app (DMG + dir targets)
        run: cd electron && npx electron-builder --mac

      - name: Rename DMG for clarity
        run: mv dist/*.dmg dist/APTestPrep-Mac.dmg

      - name: Package macOS ZIP for in-app updater
        run: |
          cd dist/mac-arm64

          # Create the ZIP (used by the in-app updater, not for manual download)
          zip -r APTestPrep-Mac.zip "AP Test Prep.app"

          # Generate checksums.txt so the updater can verify integrity
          shasum -a 256 APTestPrep-Mac.zip > checksums.txt

      - name: Upload macOS release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/APTestPrep-Mac.dmg
            dist/mac-arm64/APTestPrep-Mac.zip
            dist/mac-arm64/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows build ───────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd electron && npm install

      - name: Copy app files into electron/
        shell: bash
        run: cd electron && npm run copy-files

      - name: Build Windows installer (NSIS)
        run: cd electron && npx electron-builder --win

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
