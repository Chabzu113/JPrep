<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Test — JPrep</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { overflow-x: hidden; }
    .test-navbar { display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:60px; background:var(--bg-card); border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:100; }
    .test-layout, .frq-layout { display:flex; height:calc(100vh - 60px); }
    .test-main, .frq-main { flex:1; padding:28px; overflow-y:auto; max-width:800px; }
    .test-nav { width:200px; min-width:200px; border-left:1px solid var(--border-color); padding:16px; background:var(--bg-card); overflow-y:auto; flex-shrink:0; }
    .test-nav-header { font-weight:700; font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.05em; }
    .test-nav-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
    .q-num { width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:0.75rem; font-weight:600; cursor:pointer; border:2px solid var(--border-color); background:var(--bg-secondary); color:var(--text-secondary); }
    .q-num.answered { background:var(--accent-blue); color:white; border-color:var(--accent-blue); }
    .q-num.flagged { background:var(--accent-yellow); color:white; border-color:var(--accent-yellow); }
    .q-num.current { outline:2px solid var(--accent-blue); outline-offset:2px; }
    .flag-btn { background:none; border:1px solid var(--border-color); padding:6px 12px; border-radius:6px; cursor:pointer; color:var(--text-secondary); font-size:0.9rem; }
    .flag-btn.flagged { background:var(--accent-yellow); color:white; border-color:var(--accent-yellow); }
    .test-question-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .test-progress-bar { height:4px; background:var(--bg-secondary); border-radius:99px; margin-bottom:20px; overflow:hidden; }
    .test-nav-buttons { display:flex; justify-content:space-between; margin-top:24px; padding-top:20px; border-top:1px solid var(--border-color); }
    .frq-part { margin-bottom:20px; padding:20px; background:var(--bg-secondary); border-radius:10px; }
    .frq-part-label { font-weight:700; font-size:1rem; margin-bottom:6px; }
    .frq-part-instruction { color:var(--text-secondary); margin-bottom:10px; line-height:1.6; }
    .frq-points { color:var(--text-muted); font-weight:400; font-size:0.9rem; }
    .frq-textarea { width:100%; min-height:180px; padding:12px; font-family:monospace; font-size:0.9rem; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-primary); color:var(--text-primary); resize:vertical; line-height:1.6; box-sizing:border-box; }
    #frqNavGrid { display:flex; flex-direction:column; gap:6px; }
    #frqNavGrid .q-num { width:auto; padding:6px 10px; font-size:0.8rem; }
    .screen-container { animation: fadeIn 0.2s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @media (max-width:768px) { .test-nav { display:none; } .test-main, .frq-main { padding:16px; } }
    /* ── AP Calc AB: table questions ──────────────────────────────── */
    .q-table-wrap { overflow-x:auto; margin:12px 0 20px; border-radius:8px; border:1px solid var(--border-color); }
    .q-table { border-collapse:collapse; width:100%; font-size:0.9rem; }
    .q-table th, .q-table td { padding:8px 14px; border:1px solid var(--border-color); text-align:center; }
    .q-table th { background:var(--bg-secondary); font-weight:600; color:var(--text-secondary); }
    /* ── AP Calc AB: graph description box ───────────────────────── */
    .graph-description { display:flex; gap:10px; align-items:flex-start; margin:10px 0 18px; padding:12px 16px; background:var(--bg-secondary); border-left:3px solid var(--accent-blue); border-radius:6px; font-size:0.9rem; color:var(--text-secondary); line-height:1.6; }
    /* ── KaTeX display overrides ──────────────────────────────────── */
    .math-display .katex-display { margin:4px 0; }
    .choice-item .katex { font-size:1em; }
    /* ── Desmos panel ─────────────────────────────────────────────── */
    #desmos-panel { display:none; position:fixed; bottom:20px; right:20px; width:460px; height:360px; background:#fff; border:2px solid var(--border-color); border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.18); z-index:9999; overflow:hidden; resize:both; min-width:280px; min-height:200px; }
    #desmos-drag { display:flex; align-items:center; justify-content:space-between; padding:0 10px; height:32px; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); cursor:grab; border-radius:10px 10px 0 0; user-select:none; flex-shrink:0; }
    #desmos-drag:active { cursor:grabbing; }
    #desmos-drag-label { font-size:0.75rem; font-weight:600; color:var(--text-muted); letter-spacing:0.03em; }
    #desmos-close { background:none; border:none; font-size:1.1rem; cursor:pointer; color:#777; line-height:1; padding:2px 4px; border-radius:4px; }
    #desmos-close:hover { background:var(--bg-card); color:var(--text-primary); }
    .calc-btn { background:var(--bg-secondary); border:1px solid var(--border-color); padding:6px 12px; border-radius:6px; cursor:pointer; color:var(--text-primary); font-size:0.85rem; }
    .calc-btn:hover { background:var(--bg-card); }
  </style>
  <!-- KaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Hub Navbar (shown on test selection screen) -->
  <nav class="test-navbar" id="hubNavbar" style="justify-content:space-between">
    <a href="index.html" class="navbar-brand" style="text-decoration:none;font-weight:700">JPrep</a>
    <div id="subjectSwitcher" style="margin:0 12px"></div>
    <a href="index.html" class="btn btn-secondary btn-sm">← Dashboard</a>
  </nav>

  <!-- Test Navbar (shown during an active test) -->
  <nav class="test-navbar hidden" id="testNavbar">
    <a href="#" id="goBackBtn" class="navbar-brand" style="text-decoration:none;font-size:0.9rem;color:var(--text-muted)">← Tests</a>
    <div class="timer" id="timerDisplay" style="font-family:monospace;font-size:1.2rem;font-weight:700">1:30:00</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="calc-btn" id="desmosBtn" title="Graphing Calculator">📊 Calc</button>
      <button class="btn btn-secondary btn-sm" id="saveExitBtn">💾 Save &amp; Exit</button>
      <button class="btn btn-danger btn-sm" id="submitSectionBtn">Submit Section</button>
    </div>
  </nav>

  <!-- Intro Screen -->
  <div id="introScreen" class="screen-container"></div>

  <!-- MCQ Screen -->
  <div id="mcqScreen" class="screen-container hidden">
    <div class="test-layout">
      <div class="test-main">
        <div class="test-progress-bar"><div id="mcqProgressFill" style="height:100%;background:var(--accent-blue);border-radius:99px;width:0%;transition:width 0.3s"></div></div>
        <div class="test-question-header">
          <span id="mcqQuestionNum" style="font-weight:600;color:var(--text-secondary)"></span>
          <button class="flag-btn" id="flagBtn">⚑ Flag</button>
        </div>
        <div id="mcqQuestionContent"></div>
        <div class="test-nav-buttons">
          <button class="btn btn-secondary" id="prevMCQ">← Previous</button>
          <button class="btn btn-primary" id="nextMCQ">Next →</button>
        </div>
      </div>
      <aside class="test-nav">
        <div class="test-nav-header">Questions</div>
        <div class="test-nav-grid" id="navGrid"></div>
        <div style="margin-top:16px;font-size:0.8rem;color:var(--text-muted)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:14px;height:14px;background:var(--accent-blue);border-radius:3px;display:inline-block"></span> Answered</div>
          <div style="display:flex;align-items:center;gap:6px"><span style="width:14px;height:14px;background:var(--accent-yellow);border-radius:3px;display:inline-block"></span> Flagged</div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Break Screen -->
  <div id="breakScreen" class="screen-container hidden"></div>

  <!-- FRQ Screen -->
  <div id="frqScreen" class="screen-container hidden">
    <div class="frq-layout">
      <div class="frq-main">
        <div class="test-progress-bar"><div id="frqProgressFill" style="height:100%;background:#10B981;border-radius:99px;width:0%;transition:width 0.3s"></div></div>
        <div class="test-question-header">
          <span id="frqQuestionNum" style="font-weight:600;color:var(--text-secondary)"></span>
          <button class="flag-btn" id="frqFlagBtn">⚑ Flag</button>
        </div>
        <div id="frqQuestionContent"></div>
        <div class="test-nav-buttons">
          <button class="btn btn-secondary" id="prevFRQ">← Previous</button>
          <button class="btn btn-primary" id="nextFRQ">Next →</button>
        </div>
      </div>
      <aside class="test-nav">
        <div class="test-nav-header">FRQ Questions</div>
        <div id="frqNavGrid"></div>
      </aside>
    </div>
  </div>

  <!-- Done Screen -->
  <div id="doneScreen" class="screen-container hidden"></div>

  <!-- Submit Modal -->
  <div class="modal-overlay hidden" id="submitModal">
    <div class="modal">
      <div class="modal-header"><h3 id="submitModalTitle">Submit Section?</h3></div>
      <div class="modal-body" id="submitModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelSubmit">Continue Test</button>
        <button class="btn btn-primary" id="confirmSubmit">Submit</button>
      </div>
    </div>
  </div>

  <!-- Desmos floating panel — draggable + resizable -->
  <div id="desmos-panel" style="display:none">
    <div id="desmos-drag">
      <span id="desmos-drag-label">📊 Desmos Calculator</span>
      <button id="desmos-close" title="Close">✕</button>
    </div>
    <iframe src="https://www.desmos.com/calculator" style="width:100%;height:calc(100% - 32px);border:none;display:block;" title="Desmos Graphing Calculator"></iframe>
  </div>
  <!-- Question bank data -->
  <script src="js/data/apcsa_mcq.js"></script>
  <script src="js/data/frq.js"></script>
  <script src="js/data/tests.js"></script>
  <script src="js/data/apbio_mcq.js"></script>
  <script src="js/data/apbio_test_mcq.js"></script>
  <script src="js/data/apbio_frq.js"></script>
  <script src="js/data/apbio_frq_graded.js"></script>
  <script src="js/data/apbio_tests.js"></script>
  <script src="js/data/apcalc_mcq.js"></script>
  <script src="js/data/apcalc_frq.js"></script>
  <script src="js/data/apstats_mcq.js"></script>
  <script src="js/data/apstats_frq.js"></script>
  <script src="js/data/apmicro_mcq.js"></script>
  <script src="js/data/apmicro_frq.js"></script>
  <script src="js/data/apmacro_mcq.js"></script>
  <script src="js/data/apmacro_frq.js"></script>
  <script src="js/data/apgov_mcq.js"></script>
  <script src="js/data/apgov_frq.js"></script>
  <script src="js/data/apcalcbc_mcq.js"></script>
  <script src="js/data/apcalcbc_frq.js"></script>
  <script src="js/data/apenviro_mcq.js"></script>
  <script src="js/data/apenviro_frq.js"></script>
  <script src="js/data/tests/p1_calcab.js"></script>
  <script src="js/data/tests/p1_calcbc.js"></script>
  <script src="js/data/tests/p1_stats.js"></script>
  <script src="js/data/tests/p1_micro.js"></script>
  <script src="js/data/tests/p1_macro.js"></script>
  <script src="js/data/tests/p1_ush.js"></script>
  <script src="js/data/tests/p1_phys1.js"></script>
  <script src="js/data/tests/p1_physcem.js"></script>
  <script src="js/data/tests/p1_gov.js"></script>
  <script src="js/data/tests/p1_enviro.js"></script>
  <script src="js/data/tests/p1_bio.js"></script>
  <script src="js/data/tests/p1_csa.js"></script>
  <script src="js/data/apush_mcq.js"></script>
  <script src="js/data/apush_frq.js"></script>
  <script src="js/data/apphyscem_frq.js"></script>
  <script src="js/data/physc_mcq.js"></script>
  <script src="js/data/frqConfigs.js"></script>
  <script src="js/data/physics_mcq.js"></script>
  <script src="js/data/physics_frq.js"></script>
  <script src="js/physicsRenderer.js"></script>
  <script src="js/genericFRQGrader.js"></script>
  <script src="js/apushGrader.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/subjects.js"></script>
  <script src="js/app.js"></script>
  <script src="js/testRunner.js"></script>
</body>
</html>
