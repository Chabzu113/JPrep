<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Bank — AP Test Prep</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/planner.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       SETUP SCREEN — shown before session starts
  ═══════════════════════════════════════════════════════ -->
  <div id="setupScreen">
    <nav class="navbar">
      <a href="index.html" class="navbar-brand">AP Test Prep</a>
      <div class="navbar-links">
        <a href="planner.html" class="nav-link">Planner</a>
        <a href="question-bank.html" class="nav-link active">Question Bank</a>
        <a href="practice-test.html" class="nav-link">Practice Tests</a>
        <a href="results.html" class="nav-link">Progress</a>
      </div>
      <div class="navbar-actions">
        <div class="navbar-subject-switcher" id="subjectSwitcher"></div>
        <button class="btn btn-secondary btn-sm dark-mode-toggle" id="darkModeBtn" aria-label="Toggle dark mode">🌙</button>
        <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
      </div>
    </nav>
    <div class="nav-mobile hidden" id="mobileNav">
      <a href="planner.html">Planner</a>
      <a href="question-bank.html">Question Bank</a>
      <a href="practice-test.html">Practice Tests</a>
      <a href="results.html">Progress</a>
    </div>
    <!-- Subject context bar -->
    <div id="subjectContextBar" class="subject-context-bar" style="background:#3B82F6">
      <span id="subjectContextEmoji">💻</span>
      <span id="subjectContextName">AP Computer Science A — Question Bank</span>
      <span id="subjectContextExam" style="margin-left:auto;opacity:0.85;font-weight:400"></span>
    </div>

    <!-- Unit Tab Bar -->
    <div class="unit-tab-bar" id="unitTabBar">
      <!-- Injected by questionBank.js -->
    </div>

    <!-- Page Header -->
    <div style="background:var(--bg-secondary);border-bottom:1px solid var(--border-color);padding:20px 0">
      <div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <h1 style="font-size:1.6rem;font-weight:800;margin-bottom:4px">Question Bank</h1>
          <p style="color:var(--text-muted);font-size:0.9rem">225+ questions · 4 units · Easy, Medium, Hard</p>
        </div>
        <button class="btn btn-secondary btn-sm" id="mobileFilterToggle">⚙ Filters</button>
      </div>
    </div>

    <!-- Page Layout -->
    <div class="page-layout">

      <!-- Filters Sidebar -->
      <aside class="filters-sidebar" id="filtersSidebar">
        <div class="filters-header">
          <h3>Filters</h3>
          <button class="btn btn-secondary btn-sm" id="clearFilters">Clear all</button>
        </div>

        <!-- Units & Topics Accordion -->
        <div class="filter-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="filter-label" style="margin-bottom:0">Units &amp; Topics</span>
            <button class="btn btn-secondary btn-sm" id="clearTopics" style="font-size:0.72rem;padding:3px 8px">Clear</button>
          </div>
          <div id="topicAccordion"></div>
        </div>

        <!-- Difficulty -->
        <div class="filter-group">
          <span class="filter-label">Difficulty</span>
          <div class="filter-chips" id="diffChips">
            <button class="filter-chip active" data-filter="difficulty" data-value="all">All</button>
            <button class="filter-chip" data-filter="difficulty" data-value="easy">🟢 Easy</button>
            <button class="filter-chip" data-filter="difficulty" data-value="medium">🟡 Medium</button>
            <button class="filter-chip" data-filter="difficulty" data-value="hard">🔴 Hard</button>
          </div>
        </div>

        <!-- Type -->
        <div class="filter-group">
          <span class="filter-label">Question Type</span>
          <div class="filter-chips" id="typeChips">
            <button class="filter-chip active" data-filter="type" data-value="all">All</button>
            <button class="filter-chip" data-filter="type" data-value="MCQ">MCQ</button>
            <button class="filter-chip" data-filter="type" data-value="FRQ">FRQ</button>
          </div>
        </div>

        <!-- Status -->
        <div class="filter-group">
          <span class="filter-label">Status</span>
          <div class="filter-chips" id="statusChips">
            <button class="filter-chip active" data-filter="status" data-value="all">All</button>
            <button class="filter-chip" data-filter="status" data-value="unseen">Unseen</button>
            <button class="filter-chip" data-filter="status" data-value="correct">✅ Correct</button>
            <button class="filter-chip" data-filter="status" data-value="incorrect">❌ Incorrect</button>
          </div>
        </div>

        <!-- Sort -->
        <div class="filter-group">
          <span class="filter-label">Sort By</span>
          <select class="filter-select" id="sortSelect">
            <option value="unit-order">Unit Order</option>
            <option value="difficulty-asc">Easiest First</option>
            <option value="difficulty-desc">Hardest First</option>
            <option value="random">Random</option>
          </select>
        </div>

        <!-- Question Limit -->
        <div class="filter-group">
          <span class="filter-label">Question Limit</span>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" id="questionLimitInput" class="filter-select"
              min="1" max="999" placeholder="All"
              style="width:80px;padding:6px 10px;text-align:center">
            <span style="font-size:0.85rem;color:var(--text-muted)" id="limitAvailLabel"></span>
          </div>
        </div>

        <!-- Start Session Button -->
        <div style="margin-top:24px">
          <button class="btn btn-primary" id="startSessionBtn" style="width:100%;font-size:1rem;padding:12px">
            ▶ Start Practice
          </button>
          <p id="sessionCountLabel" style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-top:8px"></p>
        </div>
      </aside>

      <!-- Main Content — question preview list -->
      <main class="main-content">
        <div class="results-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <span id="resultsCount" style="color:var(--text-muted);font-size:0.95rem"></span>
        </div>
        <div id="previewContainer"></div>
      </main>
    </div>

    <!-- Mobile filter overlay -->
    <div class="modal-overlay hidden" id="filterOverlay" onclick="document.getElementById('filtersSidebar').classList.remove('open');this.classList.add('hidden')"></div>
  </div><!-- /#setupScreen -->


  <!-- ═══════════════════════════════════════════════════════
       SESSION SCREEN — shown during active practice
  ═══════════════════════════════════════════════════════ -->
  <div id="sessionScreen" class="hidden">

    <!-- Session Header -->
    <div class="session-header">
      <div class="session-header-left">
        <button class="btn btn-secondary btn-sm" id="endSessionBtn">✕ End Session</button>
      </div>
      <div class="session-progress-info">
        <span id="sessionCounter" class="session-counter"></span>
        <div class="session-progress-bar-wrap">
          <div class="session-progress-bar" id="sessionProgressBar"></div>
        </div>
      </div>
      <div class="session-header-right">
        <span id="sessionScore" class="session-score-badge"></span>
        <button class="btn btn-secondary btn-sm dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>
      </div>
    </div>

    <!-- Question Area -->
    <div class="session-body">
      <div class="session-question-wrap" id="sessionQuestionWrap">
        <!-- injected by JS -->
      </div>
    </div>

    <!-- Session Footer Nav -->
    <div class="session-footer">
      <button class="btn btn-secondary session-nav-btn" id="prevBtn" disabled>
        ← Previous
      </button>
      <div class="session-footer-center">
        <span id="sessionFooterCounter" style="color:var(--text-muted);font-size:0.9rem"></span>
      </div>
      <button class="btn btn-primary session-nav-btn" id="nextBtn">
        Next →
      </button>
    </div>

  </div><!-- /#sessionScreen -->



  <script src="js/subjects.js"></script>
  <script src="js/data/mcq_u1u2.js"></script>
  <script src="js/data/mcq_u3u4.js"></script>
  <script src="js/data/frq.js"></script>
  <script src="js/data/apbio_mcq.js"></script>
  <script src="js/data/apbio_test_mcq.js"></script>
  <script src="js/data/apbio_frq.js"></script>
  <script src="js/data/apbio_tests.js"></script>
  <script src="js/data/apcalc_mcq.js"></script>
  <script src="js/app.js"></script>
  <script src="js/questionBank.js"></script>
</body>
</html>
