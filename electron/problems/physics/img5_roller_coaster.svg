<svg xmlns="http://www.w3.org/2000/svg" width="500" height="380" viewBox="0 0 500 380">
  <rect width="500" height="380" fill="white"/>
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Roller Coaster Track</text>
  <!-- Ground reference -->
  <line x1="30" y1="350" x2="470" y2="350" stroke="#9ca3af" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="354" font-size="11" fill="#9ca3af" font-family="Arial">h = 0</text>
  <!-- Track curve -->
  <path d="M 60,60 C 60,60 100,60 120,100 C 140,140 150,200 180,250 C 210,300 240,340 280,340 C 320,340 340,300 360,200 C 370,160 390,160 410,200 C 430,240 450,340 470,340"
        fill="none" stroke="#374151" stroke-width="3"/>
  <!-- Point A at top -->
  <circle cx="60" cy="60" r="10" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="60" y="64" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial">A</text>
  <text x="75" y="50" font-size="12" font-family="Arial" fill="#2563eb">h = 25 m</text>
  <!-- Height line for A -->
  <line x1="40" y1="60" x2="40" y2="350" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="35" y="205" text-anchor="end" font-size="11" fill="#2563eb" font-family="Arial" transform="rotate(-90,35,205)">25 m</text>
  <!-- Point B -->
  <circle cx="380" cy="180" r="10" fill="#dc2626" stroke="white" stroke-width="2"/>
  <text x="380" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial">B</text>
  <text x="400" y="172" font-size="12" font-family="Arial" fill="#dc2626">h = 10 m</text>
  <!-- Height line for B -->
  <line x1="420" y1="180" x2="420" y2="350" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="432" y="270" font-size="11" fill="#dc2626" font-family="Arial" transform="rotate(-90,432,270)">10 m</text>
  <!-- Cart at A -->
  <rect x="48" y="42" width="24" height="14" fill="#fbbf24" stroke="#92400e" stroke-width="1.5" rx="3"/>
</svg>