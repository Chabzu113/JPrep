<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white"/>
  <!-- Axes -->
  <line x1="60" y1="175" x2="460" y2="175" stroke="black" stroke-width="2"/>
  <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="2"/>
  <text x="250" y="340" text-anchor="middle" font-size="14" font-family="Arial">Time (s)</text>
  <text x="18" y="170" text-anchor="middle" font-size="14" font-family="Arial" transform="rotate(-90,18,170)">Displacement (m)</text>
  <text x="250" y="20" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Displacement vs. Time (Mass-Spring)</text>
  <!-- Grid -->
  <line x1="160" y1="30" x2="160" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="260" y1="30" x2="260" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="360" y1="30" x2="360" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="30" x2="460" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="75" x2="460" y2="75" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="125" x2="460" y2="125" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="225" x2="460" y2="225" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="275" x2="460" y2="275" stroke="#ddd" stroke-width="1"/>
  <!-- Tick labels - X (each 100px = 2s) -->
  <text x="60" y="198" text-anchor="middle" font-size="12" font-family="Arial">0</text>
  <text x="160" y="198" text-anchor="middle" font-size="12" font-family="Arial">2</text>
  <text x="260" y="198" text-anchor="middle" font-size="12" font-family="Arial">4</text>
  <text x="360" y="198" text-anchor="middle" font-size="12" font-family="Arial">6</text>
  <text x="460" y="198" text-anchor="middle" font-size="12" font-family="Arial">8</text>
  <!-- Tick labels - Y -->
  <text x="50" y="79" text-anchor="end" font-size="12" font-family="Arial">0.4</text>
  <text x="50" y="129" text-anchor="end" font-size="12" font-family="Arial">0.2</text>
  <text x="50" y="179" text-anchor="end" font-size="12" font-family="Arial">0</text>
  <text x="50" y="229" text-anchor="end" font-size="12" font-family="Arial">&minus;0.2</text>
  <text x="50" y="279" text-anchor="end" font-size="12" font-family="Arial">&minus;0.4</text>
  <!-- Sine wave: A=0.2m, T=4s
       y=175 is zero line. Amplitude 0.2m = 50px (125 is +0.2, 225 is -0.2)
       Period = 4s = 200px. Half period = 100px.
       Quarter period = 50px.
       t=0(x=60): 0  t=1s(x=110): +0.2  t=2s(x=160): 0  t=3s(x=210): -0.2
       t=4s(x=260): 0  t=5s(x=310): +0.2  t=6s(x=360): 0  t=7s(x=410): -0.2  t=8s(x=460): 0
  -->
  <path d="M 60,175 C 77,150 93,125 110,125 C 127,125 143,150 160,175 C 177,200 193,225 210,225 C 227,225 243,200 260,175 C 277,150 293,125 310,125 C 327,125 343,150 360,175 C 377,200 393,225 410,225 C 427,225 443,200 460,175" fill="none" stroke="#16a34a" stroke-width="3"/>
  <!-- Key data points -->
  <circle cx="60" cy="175" r="3" fill="#16a34a"/>
  <circle cx="110" cy="125" r="3" fill="#16a34a"/>
  <circle cx="160" cy="175" r="3" fill="#16a34a"/>
  <circle cx="210" cy="225" r="3" fill="#16a34a"/>
  <circle cx="260" cy="175" r="3" fill="#16a34a"/>
  <circle cx="310" cy="125" r="3" fill="#16a34a"/>
  <circle cx="360" cy="175" r="3" fill="#16a34a"/>
  <circle cx="410" cy="225" r="3" fill="#16a34a"/>
  <circle cx="460" cy="175" r="3" fill="#16a34a"/>
  <!-- Amplitude annotation (from peak at y=125 to zero at y=175) -->
  <line x1="110" y1="125" x2="110" y2="175" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="125" y="152" font-size="11" fill="#dc2626" font-family="Arial">A = 0.2 m</text>
  <!-- Period annotation (one full cycle: t=0 to t=4s, x=60 to x=260) -->
  <line x1="60" y1="55" x2="260" y2="55" stroke="#2563eb" stroke-width="1.5" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
  <text x="160" y="47" text-anchor="middle" font-size="12" fill="#2563eb" font-family="Arial" font-weight="bold">T = 4 s</text>
  <defs>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0, 0 3.5, 10 7" fill="#2563eb"/></marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  </defs>
</svg>