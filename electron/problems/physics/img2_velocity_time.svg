<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white"/>
  <!-- Axes -->
  <line x1="60" y1="180" x2="460" y2="180" stroke="black" stroke-width="2"/>
  <line x1="60" y1="310" x2="60" y2="30" stroke="black" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="250" y="340" text-anchor="middle" font-size="14" font-family="Arial">Time (s)</text>
  <text x="18" y="170" text-anchor="middle" font-size="14" font-family="Arial" transform="rotate(-90,18,170)">Velocity (m/s)</text>
  <text x="250" y="20" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Velocity vs. Time</text>
  <!-- Grid -->
  <line x1="60" y1="80" x2="460" y2="80" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="130" x2="460" y2="130" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="230" x2="460" y2="230" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="280" x2="460" y2="280" stroke="#ddd" stroke-width="1"/>
  <line x1="160" y1="30" x2="160" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="260" y1="30" x2="260" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="360" y1="30" x2="360" y2="310" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="30" x2="460" y2="310" stroke="#ddd" stroke-width="1"/>
  <!-- Tick labels - X -->
  <text x="60" y="200" text-anchor="middle" font-size="12" font-family="Arial">0</text>
  <text x="160" y="200" text-anchor="middle" font-size="12" font-family="Arial">1</text>
  <text x="260" y="200" text-anchor="middle" font-size="12" font-family="Arial">2</text>
  <text x="360" y="200" text-anchor="middle" font-size="12" font-family="Arial">3</text>
  <text x="460" y="200" text-anchor="middle" font-size="12" font-family="Arial">4</text>
  <!-- Tick labels - Y -->
  <text x="50" y="84" text-anchor="end" font-size="12" font-family="Arial">20</text>
  <text x="50" y="134" text-anchor="end" font-size="12" font-family="Arial">10</text>
  <text x="50" y="184" text-anchor="end" font-size="12" font-family="Arial">0</text>
  <text x="50" y="234" text-anchor="end" font-size="12" font-family="Arial">−10</text>
  <text x="50" y="284" text-anchor="end" font-size="12" font-family="Arial">−20</text>
  <!-- Velocity line: starts at +20, goes to -20 over 4s (linear, slope = -10 m/s²) -->
  <line x1="60" y1="80" x2="460" y2="280" stroke="#dc2626" stroke-width="3"/>
  <circle cx="60" cy="80" r="4" fill="#dc2626"/>
  <circle cx="260" cy="180" r="4" fill="#dc2626"/>
  <circle cx="460" cy="280" r="4" fill="#dc2626"/>
  <!-- Shaded area above x-axis (positive area = max height) -->
  <polygon points="60,80 260,180 60,180" fill="rgba(37,99,235,0.15)" stroke="none"/>
  <text x="120" y="150" font-size="11" fill="#2563eb" font-family="Arial">Area = max height</text>
</svg>