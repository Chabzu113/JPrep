<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white"/>
  <!-- Axes -->
  <line x1="60" y1="280" x2="460" y2="280" stroke="black" stroke-width="2"/>
  <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" font-size="14" font-family="Arial">Displacement (m)</text>
  <text x="18" y="155" text-anchor="middle" font-size="14" font-family="Arial" transform="rotate(-90,18,155)">Force (N)</text>
  <text x="250" y="20" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Force vs. Displacement</text>
  <!-- Grid -->
  <line x1="110" y1="280" x2="110" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="160" y1="280" x2="160" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="210" y1="280" x2="210" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="260" y1="280" x2="260" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="310" y1="280" x2="310" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="360" y1="280" x2="360" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="410" y1="280" x2="410" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="280" x2="460" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="230" x2="460" y2="230" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="180" x2="460" y2="180" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="130" x2="460" y2="130" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="80" x2="460" y2="80" stroke="#ddd" stroke-width="1"/>
  <!-- Tick labels - X -->
  <text x="60" y="298" text-anchor="middle" font-size="12" font-family="Arial">0</text>
  <text x="110" y="298" text-anchor="middle" font-size="12" font-family="Arial">1</text>
  <text x="160" y="298" text-anchor="middle" font-size="12" font-family="Arial">2</text>
  <text x="210" y="298" text-anchor="middle" font-size="12" font-family="Arial">3</text>
  <text x="260" y="298" text-anchor="middle" font-size="12" font-family="Arial">4</text>
  <text x="310" y="298" text-anchor="middle" font-size="12" font-family="Arial">5</text>
  <text x="360" y="298" text-anchor="middle" font-size="12" font-family="Arial">6</text>
  <text x="410" y="298" text-anchor="middle" font-size="12" font-family="Arial">7</text>
  <text x="460" y="298" text-anchor="middle" font-size="12" font-family="Arial">8</text>
  <!-- Tick labels - Y -->
  <text x="50" y="284" text-anchor="end" font-size="12" font-family="Arial">0</text>
  <text x="50" y="234" text-anchor="end" font-size="12" font-family="Arial">5</text>
  <text x="50" y="184" text-anchor="end" font-size="12" font-family="Arial">10</text>
  <text x="50" y="134" text-anchor="end" font-size="12" font-family="Arial">15</text>
  <text x="50" y="84" text-anchor="end" font-size="12" font-family="Arial">20</text>
  <!-- Force graph: 0-3m at 10N, 3-6m triangle up to 10N, 6-8m at 0 → total area = 30J -->
  <!-- Rectangle 0 to 3: F=10N → area = 30... that's too much. Let me adjust: -->
  <!-- 0-4m: triangle from 0 to 10N → area = ½×4×10 = 20 -->
  <!-- 4-6m: constant 5N → area = 2×5 = 10 -->
  <!-- Total = 30J -->
  <polygon points="60,280 260,180 260,280" fill="rgba(37,99,235,0.15)" stroke="none"/>
  <polygon points="260,230 360,230 360,280 260,280" fill="rgba(37,99,235,0.15)" stroke="none"/>
  <polyline points="60,280 260,180 260,230 360,230 360,280" fill="none" stroke="#2563eb" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="60" cy="280" r="4" fill="#2563eb"/>
  <circle cx="260" cy="180" r="4" fill="#2563eb"/>
  <circle cx="260" cy="230" r="4" fill="#2563eb"/>
  <circle cx="360" cy="230" r="4" fill="#2563eb"/>
  <circle cx="360" cy="280" r="4" fill="#2563eb"/>
  <!-- Area labels -->
  <text x="160" y="258" text-anchor="middle" font-size="12" fill="#2563eb" font-family="Arial">20 J</text>
  <text x="310" y="268" text-anchor="middle" font-size="12" fill="#2563eb" font-family="Arial">10 J</text>
</svg>