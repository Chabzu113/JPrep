<svg xmlns="http://www.w3.org/2000/svg" width="500" height="380" viewBox="0 0 500 380">
  <rect width="500" height="380" fill="white"/>
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Pendulum — Three Positions</text>
  <!-- Pivot -->
  <rect x="230" y="50" width="40" height="10" fill="#374151" rx="3"/>
  <circle cx="250" cy="60" r="5" fill="#374151"/>
  <!-- Position A (left) -->
  <line x1="250" y1="60" x2="130" y2="200" stroke="#9ca3af" stroke-width="2"/>
  <circle cx="130" cy="200" r="18" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="206" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#1e3a5f">A</text>
  <!-- Height label for A -->
  <line x1="100" y1="200" x2="100" y2="310" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="90" y="258" text-anchor="end" font-size="11" fill="#2563eb" font-family="Arial">h</text>
  <!-- Position B (bottom center) -->
  <line x1="250" y1="60" x2="250" y2="310" stroke="#374151" stroke-width="2"/>
  <circle cx="250" cy="310" r="18" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="316" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#14532d">B</text>
  <!-- Label for B -->
  <text x="250" y="350" text-anchor="middle" font-size="12" fill="#16a34a" font-family="Arial">Lowest point</text>
  <!-- Position C (right) -->
  <line x1="250" y1="60" x2="370" y2="200" stroke="#9ca3af" stroke-width="2"/>
  <circle cx="370" cy="200" r="18" fill="#fca5a5" stroke="#dc2626" stroke-width="2"/>
  <text x="370" y="206" text-anchor="middle" font-size="15" font-weight="bold" font-family="Arial" fill="#7f1d1d">C</text>
  <!-- Height label for C -->
  <line x1="400" y1="200" x2="400" y2="310" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="412" y="258" font-size="11" fill="#dc2626" font-family="Arial">h</text>
  <!-- Swing arc -->
  <path d="M 130,200 A 250,250 0 0,1 370,200" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Arrow showing swing direction -->
  <path d="M 155,225 A 200,200 0 0,1 200,280" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowO)"/>
  <path d="M 345,225 A 200,200 0 0,0 300,280" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowO)"/>
  <!-- Reference line at bottom -->
  <line x1="80" y1="310" x2="420" y2="310" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="440" y="314" font-size="10" fill="#9ca3af" font-family="Arial">h = 0</text>
  <defs>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/></marker>
  </defs>
</svg>