<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="white"/>
  <!-- Axes -->
  <line x1="60" y1="290" x2="460" y2="290" stroke="black" stroke-width="2"/>
  <line x1="60" y1="290" x2="60" y2="30" stroke="black" stroke-width="2"/>
  <!-- Axis labels -->
  <text x="250" y="330" text-anchor="middle" font-size="14" font-family="Arial">Time (s)</text>
  <text x="20" y="160" text-anchor="middle" font-size="14" font-family="Arial" transform="rotate(-90,20,160)">Position (m)</text>
  <text x="250" y="20" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Position vs. Time</text>
  <!-- Grid lines -->
  <line x1="110" y1="290" x2="110" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="160" y1="290" x2="160" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="210" y1="290" x2="210" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="260" y1="290" x2="260" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="310" y1="290" x2="310" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="360" y1="290" x2="360" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="410" y1="290" x2="410" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="460" y1="290" x2="460" y2="35" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="240" x2="460" y2="240" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="190" x2="460" y2="190" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="140" x2="460" y2="140" stroke="#ddd" stroke-width="1"/>
  <line x1="60" y1="90" x2="460" y2="90" stroke="#ddd" stroke-width="1"/>
  <!-- Tick labels - X axis -->
  <text x="60" y="308" text-anchor="middle" font-size="12" font-family="Arial">0</text>
  <text x="110" y="308" text-anchor="middle" font-size="12" font-family="Arial">1</text>
  <text x="160" y="308" text-anchor="middle" font-size="12" font-family="Arial">2</text>
  <text x="210" y="308" text-anchor="middle" font-size="12" font-family="Arial">3</text>
  <text x="260" y="308" text-anchor="middle" font-size="12" font-family="Arial">4</text>
  <text x="310" y="308" text-anchor="middle" font-size="12" font-family="Arial">5</text>
  <text x="360" y="308" text-anchor="middle" font-size="12" font-family="Arial">6</text>
  <text x="410" y="308" text-anchor="middle" font-size="12" font-family="Arial">7</text>
  <text x="460" y="308" text-anchor="middle" font-size="12" font-family="Arial">8</text>
  <!-- Tick labels - Y axis -->
  <text x="50" y="294" text-anchor="end" font-size="12" font-family="Arial">0</text>
  <text x="50" y="244" text-anchor="end" font-size="12" font-family="Arial">2</text>
  <text x="50" y="194" text-anchor="end" font-size="12" font-family="Arial">4</text>
  <text x="50" y="144" text-anchor="end" font-size="12" font-family="Arial">6</text>
  <text x="50" y="94" text-anchor="end" font-size="12" font-family="Arial">8</text>
  <!-- Data line: 0-2s slow rise, 2-4s flat, 4-6s steep rise, 6-8s gentle decline -->
  <polyline points="60,290 160,240 260,240 360,90 460,140" fill="none" stroke="#2563eb" stroke-width="3" stroke-linejoin="round"/>
  <!-- Dots at key points -->
  <circle cx="60" cy="290" r="4" fill="#2563eb"/>
  <circle cx="160" cy="240" r="4" fill="#2563eb"/>
  <circle cx="260" cy="240" r="4" fill="#2563eb"/>
  <circle cx="360" cy="90" r="4" fill="#2563eb"/>
  <circle cx="460" cy="140" r="4" fill="#2563eb"/>
</svg>