<svg xmlns="http://www.w3.org/2000/svg" width="500" height="380" viewBox="0 0 500 380">
  <rect width="500" height="380" fill="white"/>
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Free-Body Diagram — Block on Incline</text>
  <!-- Inclined plane -->
  <polygon points="80,320 420,320 420,120" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <!-- Block on incline -->
  <g transform="translate(300,195) rotate(-30.5)">
    <rect x="-30" y="-30" width="60" height="60" fill="#93c5fd" stroke="#2563eb" stroke-width="2" rx="4"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial" fill="#1e3a5f">m</text>
  </g>
  <!-- Force arrows from block center (~300, 195) -->
  <!-- Weight mg (straight down) -->
  <line x1="300" y1="195" x2="300" y2="295" stroke="#dc2626" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="315" y="285" font-size="14" font-weight="bold" font-family="Arial" fill="#dc2626">mg</text>
  <!-- Normal force (perpendicular to surface, pointing away from surface) -->
  <line x1="300" y1="195" x2="252" y2="112" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="235" y="108" font-size="14" font-weight="bold" font-family="Arial" fill="#16a34a">F_N</text>
  <!-- Friction (along surface, pointing UP the incline — opposing tendency to slide down) -->
  <line x1="300" y1="195" x2="385" y2="146" stroke="#d97706" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="395" y="138" font-size="14" font-weight="bold" font-family="Arial" fill="#d97706">f</text>
  <!-- Angle label -->
  <path d="M 380,320 A 50,50 0 0,0 376,295" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="395" y="310" font-size="14" font-family="Arial" font-style="italic">&theta;</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/></marker>
  </defs>
</svg>